<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</a>
    <div class="d-flex gap-2" id="nav-login">
      <a href="/giris.html" class="btn btn-outline-light btn-sm">Giriş Yap</a>
      <a href="/login.html#register" class="btn btn-primary btn-sm">Kayıt Ol</a>
    </div>
    <div id="nav-user" style="display:none" class="d-flex gap-2">
      <a href="/panel/" class="btn btn-primary btn-sm">Dashboard</a>
      <button class="btn btn-outline-light btn-sm logout-btn">Çıkış</button>
    </div>
  </div>
</nav>

<div class="container" style="margin-top:90px;margin-bottom:60px">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 class="fw-bold mb-2">İletişim</h2>
      <p class="text-muted mb-4">Sorularınız veya geri bildirimleriniz için bizimle iletişime geçin.</p>
      <div id="alert-container"></div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form id="contact-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Ad Soyad <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="c-adsoyad" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">E-posta <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="c-email" required>
              </div>
              <div class="col-12">
                <label class="form-label">Konu <span class="text-danger">*</span></label>
                <select class="form-select" id="c-konu" required>
                  <option value="">Konu Seçin</option>
                  <option>Teknik Destek</option>
                  <option>Fiyatlandırma</option>
                  <option>Özellik İsteği</option>
                  <option>Hata Bildirimi</option>
                  <option>Diğer</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Mesaj <span class="text-danger">*</span></label>
                <textarea class="form-control" id="c-mesaj" rows="5" required placeholder="Mesajınızı buraya yazın..."></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="bi bi-send"></i> Gönder
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card border-0 shadow-sm mt-4 mt-md-0">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3">İletişim Bilgileri</h5>
          <div class="d-flex gap-3 mb-3">
            <i class="bi bi-envelope-fill text-primary fs-4"></i>
            <div><div class="fw-semibold">E-posta</div><div class="text-muted small">destek@musteriyorum.com</div></div>
          </div>
          <div class="d-flex gap-3 mb-3">
            <i class="bi bi-clock-fill text-success fs-4"></i>
            <div><div class="fw-semibold">Çalışma Saatleri</div><div class="text-muted small">Hafta içi 09:00 - 18:00</div></div>
          </div>
          <div class="d-flex gap-3">
            <i class="bi bi-globe text-warning fs-4"></i>
            <div><div class="fw-semibold">Web</div><div class="text-muted small">www.musteriyorum.com</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="py-4">
  <div class="container text-center">
    <p class="mb-0">&copy; 2025 MüşteriYorum.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script>
updateNavbar();
document.getElementById('contact-form').addEventListener('submit', (e) => {
  e.preventDefault();
  showAlert('Mesajınız alındı! En kısa sürede dönüş yapacağız.', 'success');
  e.target.reset();
});
</script>
</body>
</html>
