<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorum Ekle - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <a href="/panel/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/yorumlar/" class="nav-link"><i class="bi bi-chat-left-text"></i> Yorumlar</a>
    <a href="/yorumlar/yukleme.html" class="nav-link"><i class="bi bi-upload"></i> Toplu Yükle</a>
    <a href="/analiz/" class="nav-link"><i class="bi bi-graph-up"></i> Analiz</a>
    <a href="/raporlar/" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Raporlar</a>
    <a href="/profil/" class="nav-link"><i class="bi bi-person-circle"></i> Profilim</a>
    <a href="/yonetici/" class="nav-link" id="sidebar-admin-link" style="display:none"><i class="bi bi-shield-check"></i> Admin</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/gelistirici/" class="nav-link"><i class="bi bi-code-slash"></i> Geliştirici</a>
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">Yorum Ekle</h4>
    <a href="/yorumlar/" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Geri</a>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <div id="alert-container"></div>
          <form id="add-review-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Müşteri Adı <span class="text-muted small">(opsiyonel)</span></label>
                <input type="text" class="form-control" id="musteri-adi" placeholder="Müşteri adını girin">
              </div>
              <div class="col-md-6 d-flex align-items-end">
                <div class="alert alert-light border mb-0 w-100 py-2 px-3 small">
                  <i class="bi bi-cpu text-primary"></i> Kategori, YZ tarafından otomatik belirlenir.
                </div>
              </div>
              <div class="col-12">
                <label class="form-label">Yorum Metni <span class="text-danger">*</span></label>
                <textarea class="form-control" id="yorum-metni" rows="5" placeholder="Müşteri yorumunu buraya girin..." required></textarea>
                <div class="form-text"><span id="char-count">0</span> karakter</div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Puan</label>
                <div class="d-flex gap-2 align-items-center mt-1" id="star-rating">
                  <i class="bi bi-star fs-4 text-warning star-btn" data-val="1" style="cursor:pointer"></i>
                  <i class="bi bi-star fs-4 text-warning star-btn" data-val="2" style="cursor:pointer"></i>
                  <i class="bi bi-star fs-4 text-warning star-btn" data-val="3" style="cursor:pointer"></i>
                  <i class="bi bi-star fs-4 text-warning star-btn" data-val="4" style="cursor:pointer"></i>
                  <i class="bi bi-star fs-4 text-warning star-btn" data-val="5" style="cursor:pointer"></i>
                  <span class="text-muted small ms-2" id="puan-text">Puan seçin</span>
                </div>
                <input type="hidden" id="puan" value="">
              </div>
              <div class="col-md-6">
                <label class="form-label">Tarih</label>
                <input type="date" class="form-control" id="review-tarih">
              </div>
              <div class="col-12">
                <div class="alert alert-info d-flex align-items-center" role="alert">
                  <i class="bi bi-robot me-2"></i>
                  <div>Yorum kaydedildikten sonra <strong>YZ analizi</strong> otomatik olarak başlayacaktır.</div>
                </div>
              </div>
              <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">
                  <i class="bi bi-check-circle"></i> Kaydet ve Analiz Et
                </button>
                <a href="/yorumlar/" class="btn btn-outline-secondary px-4">İptal</a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script>
requireAuth();
updateSidebar();
(function() {
  const u = getUser();
  if (u && u.rol === 'user') window.location.replace('/yorumlar/yukleme.html');
})();

let selectedPuan = null;

// Yıldız seçimi
document.querySelectorAll('.star-btn').forEach(star => {
  star.addEventListener('mouseover', () => highlightStars(parseInt(star.dataset.val)));
  star.addEventListener('mouseout', () => highlightStars(selectedPuan || 0));
  star.addEventListener('click', () => {
    selectedPuan = parseInt(star.dataset.val);
    document.getElementById('puan').value = selectedPuan;
    document.getElementById('puan-text').textContent = selectedPuan + ' / 5';
    highlightStars(selectedPuan);
  });
});

function highlightStars(val) {
  document.querySelectorAll('.star-btn').forEach((s, i) => {
    s.className = `bi bi-star${i < val ? '-fill' : ''} fs-4 text-warning star-btn`;
  });
}

document.getElementById('yorum-metni').addEventListener('input', function() {
  document.getElementById('char-count').textContent = this.value.length;
});

document.getElementById('add-review-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const yorum_metni = document.getElementById('yorum-metni').value.trim();
  if (!yorum_metni) { showAlert('Yorum metni zorunludur'); return; }

  const body = {
    musteri_adi: document.getElementById('musteri-adi').value || null,
    yorum_metni,
    puan: selectedPuan,
    kaynak: 'manuel'
  };

  try {
    const res = await apiFetch('/api/reviews', { method: 'POST', body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { showAlert(data.hata || 'Hata oluştu'); return; }
    showAlert('Yorum başarıyla eklendi! YZ analizi başlatıldı.', 'success');
    setTimeout(() => window.location.href = '/reviews/', 1500);
  } catch { showAlert('Bağlantı hatası'); }
});

document.getElementById('review-tarih').valueAsDate = new Date();
</script>
</body>
</html>
