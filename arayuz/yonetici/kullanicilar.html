<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kullanıcı Yönetimi - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <a href="/panel/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/yorumlar/" class="nav-link"><i class="bi bi-chat-left-text"></i> Yorumlar</a>
    <a href="/analiz/" class="nav-link"><i class="bi bi-graph-up"></i> Analiz</a>
    <a href="/raporlar/" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Raporlar</a>
    <a href="/profil/" class="nav-link"><i class="bi bi-person-circle"></i> Profilim</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/yonetici/" class="nav-link"><i class="bi bi-shield-check"></i> Admin Genel</a>
    <a href="/admin/users.html" class="nav-link active"><i class="bi bi-people"></i> Kullanıcılar</a>
    <a href="/admin/businesses.html" class="nav-link"><i class="bi bi-shop"></i> İşletmeler</a>
    <a href="/admin/reviews.html" class="nav-link"><i class="bi bi-chat-left-dots"></i> Tüm Yorumlar</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <h4 class="fw-bold mb-4"><i class="bi bi-people"></i> Kullanıcı Yönetimi</h4>
  <div id="alert-container"></div>

  <!-- Rol Filtresi -->
  <div class="mb-3">
    <div class="btn-group" role="group">
      <button type="button" class="btn btn-outline-primary active" data-rol="">Tümü</button>
      <button type="button" class="btn btn-outline-primary" data-rol="musteri"><i class="bi bi-person"></i> Müşteri</button>
      <button type="button" class="btn btn-outline-success" data-rol="user"><i class="bi bi-shop"></i> İşletme</button>
      <button type="button" class="btn btn-outline-danger" data-rol="admin"><i class="bi bi-shield-check"></i> Admin</button>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div class="table-responsive" id="users-table" style="display:none">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>ID</th><th>Ad Soyad</th><th>E-posta</th><th>İşletme</th><th>Rol</th><th>Kayıt</th><th>İşlem</th></tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Düzenle Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Kullanıcı Düzenle</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="mb-3"><label class="form-label">Ad Soyad</label><input type="text" class="form-control" id="edit-adsoyad"></div>
        <div class="mb-3"><label class="form-label">E-posta</label><input type="email" class="form-control" id="edit-email"></div>
        <div class="mb-3"><label class="form-label">İşletme</label><input type="text" class="form-control" id="edit-isletme"></div>
        <div class="mb-3"><label class="form-label">Rol</label>
          <select class="form-select" id="edit-rol"><option value="musteri">Müşteri</option><option value="user">İşletme Sahibi</option><option value="admin">Admin</option></select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
        <button type="button" class="btn btn-primary" onclick="saveUser()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script>
requireAuth(); requireAdmin(); updateSidebar();
const editModal = new bootstrap.Modal(document.getElementById('editModal'));

let aktifRol = '';

async function loadUsers() {
  const url = '/api/admin/users' + (aktifRol ? '?rol=' + aktifRol : '');
  const res = await apiFetch(url);
  if (!res || !res.ok) return;
  const users = await res.json();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('users-table').style.display = '';
  document.getElementById('users-body').innerHTML = users.map(u => {
    const rolColor = u.rol === 'admin' ? 'bg-danger' : (u.rol === 'user' ? 'bg-success' : 'bg-primary');
    const rolLabel = u.rol === 'admin' ? 'Admin' : (u.rol === 'user' ? 'İşletme' : 'Müşteri');
    return `
    <tr>
      <td>${u.id}</td>
      <td>${u.ad_soyad}</td>
      <td>${u.email}</td>
      <td>${u.isletme_adi || '-'}</td>
      <td><span class="badge ${rolColor}">${rolLabel}</span></td>
      <td class="small">${formatDate(u.olusturma)}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick="openEdit(${u.id},'${u.ad_soyad}','${u.email}','${u.isletme_adi||''}','${u.rol}')"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${u.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

function openEdit(id, ad, email, isletme, rol) {
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-adsoyad').value = ad;
  document.getElementById('edit-email').value = email;
  document.getElementById('edit-isletme').value = isletme;
  document.getElementById('edit-rol').value = rol;
  editModal.show();
}

async function saveUser() {
  const id = document.getElementById('edit-id').value;
  const body = {
    ad_soyad: document.getElementById('edit-adsoyad').value,
    email: document.getElementById('edit-email').value,
    isletme_adi: document.getElementById('edit-isletme').value,
    rol: document.getElementById('edit-rol').value
  };
  const res = await apiFetch(`/api/admin/users/${id}`, { method: 'PUT', body: JSON.stringify(body) });
  editModal.hide();
  if (res && res.ok) { showAlert('Kullanıcı güncellendi', 'success'); loadUsers(); }
  else showAlert('Güncelleme başarısız');
}

async function deleteUser(id) {
  if (!confirm('Bu kullanıcıyı silmek istediğinizden emin misiniz?')) return;
  const res = await apiFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
  if (res && res.ok) { showAlert('Kullanıcı silindi', 'success'); loadUsers(); }
  else showAlert('Silme başarısız');
}

// Rol filtre butonları
document.querySelectorAll('[data-rol]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-rol]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    aktifRol = btn.dataset.rol;
    loadUsers();
  });
});

loadUsers();
</script>
</body>
</html>
