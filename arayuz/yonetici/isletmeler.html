<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşletmeler - Admin - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <a href="/panel/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/yorumlar/" class="nav-link"><i class="bi bi-chat-left-text"></i> Yorumlar</a>
    <a href="/analiz/" class="nav-link"><i class="bi bi-graph-up"></i> Analiz</a>
    <a href="/raporlar/" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Raporlar</a>
    <a href="/profil/" class="nav-link"><i class="bi bi-person-circle"></i> Profilim</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/yonetici/" class="nav-link"><i class="bi bi-shield-check"></i> Admin Genel</a>
    <a href="/admin/users.html" class="nav-link"><i class="bi bi-people"></i> Kullanıcılar</a>
    <a href="/admin/businesses.html" class="nav-link active"><i class="bi bi-shop"></i> İşletmeler</a>
    <a href="/admin/reviews.html" class="nav-link"><i class="bi bi-chat-left-dots"></i> Tüm Yorumlar</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <h4 class="fw-bold mb-4"><i class="bi bi-shop"></i> İşletme Yönetimi</h4>
  <div id="alert-container"></div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div class="table-responsive" id="tbl" style="display:none">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>ID</th><th>İşletme Adı</th><th>Sahip</th><th>Kategori</th><th>Şehir</th><th>Kayıt</th><th>İşlem</th></tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">İşletme Düzenle</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="mb-2"><label>İşletme Adı</label><input class="form-control" id="edit-ad"></div>
        <div class="mb-2"><label>Açıklama</label><textarea class="form-control" id="edit-aciklama" rows="2"></textarea></div>
        <div class="mb-2"><label>Şehir</label><input class="form-control" id="edit-sehir"></div>
        <div class="mb-2"><label>Kategori</label><input class="form-control" id="edit-kategori"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">İptal</button>
        <button class="btn btn-primary" onclick="kaydet()">Kaydet</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script>
requireAuth(); requireAdmin(); updateSidebar();
const editModal = new bootstrap.Modal(document.getElementById('editModal'));

async function load() {
  const res = await apiFetch('/api/admin/businesses');
  if (!res || !res.ok) return;
  const list = await res.json();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('tbl').style.display = '';
  document.getElementById('tbody').innerHTML = list.map(b => `
    <tr>
      <td>${b.id}</td>
      <td>${b.isletme_adi}</td>
      <td class="small">${b.owner ? b.owner.ad_soyad : '<span class="text-muted">—</span>'}</td>
      <td>${b.kategori || '-'}</td>
      <td>${b.sehir || '-'}</td>
      <td class="small">${formatDate(b.olusturma)}</td>
      <td>
        <button class="btn btn-sm btn-outline-primary me-1" onclick='openEdit(${JSON.stringify(b)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="sil(${b.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>
  `).join('');
}

function openEdit(b) {
  document.getElementById('edit-id').value = b.id;
  document.getElementById('edit-ad').value = b.isletme_adi || '';
  document.getElementById('edit-aciklama').value = b.aciklama || '';
  document.getElementById('edit-sehir').value = b.sehir || '';
  document.getElementById('edit-kategori').value = b.kategori || '';
  editModal.show();
}

async function kaydet() {
  const id = document.getElementById('edit-id').value;
  const body = {
    isletme_adi: document.getElementById('edit-ad').value,
    aciklama: document.getElementById('edit-aciklama').value,
    sehir: document.getElementById('edit-sehir').value,
    kategori: document.getElementById('edit-kategori').value
  };
  const res = await apiFetch('/api/admin/businesses/' + id, { method: 'PUT', body: JSON.stringify(body) });
  editModal.hide();
  if (res && res.ok) { showAlert('Güncellendi', 'success'); load(); }
  else showAlert('Hata oluştu');
}

async function sil(id) {
  if (!confirm('Bu işletmeyi silmek istediğinizden emin misiniz?')) return;
  const res = await apiFetch('/api/admin/businesses/' + id, { method: 'DELETE' });
  if (res && res.ok) { showAlert('Silindi', 'success'); load(); }
  else showAlert('Silinemedi');
}

load();
</script>
</body>
</html>
