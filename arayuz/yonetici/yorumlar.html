<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorum Moderasyonu - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <a href="/panel/" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/yorumlar/" class="nav-link"><i class="bi bi-chat-left-text"></i> Yorumlar</a>
    <a href="/analiz/" class="nav-link"><i class="bi bi-graph-up"></i> Analiz</a>
    <a href="/raporlar/" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Raporlar</a>
    <a href="/profil/" class="nav-link"><i class="bi bi-person-circle"></i> Profilim</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/yonetici/" class="nav-link"><i class="bi bi-shield-check"></i> Admin Genel</a>
    <a href="/admin/users.html" class="nav-link"><i class="bi bi-people"></i> Kullanıcılar</a>
    <a href="/admin/businesses.html" class="nav-link"><i class="bi bi-shop"></i> İşletmeler</a>
    <a href="/admin/reviews.html" class="nav-link active"><i class="bi bi-chat-left-dots"></i> Tüm Yorumlar</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <h4 class="fw-bold mb-4"><i class="bi bi-chat-left-dots"></i> Yorum Moderasyonu</h4>
  <div id="alert-container"></div>

  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div class="table-responsive" id="reviews-table" style="display:none">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr><th>ID</th><th>Kullanıcı</th><th>Müşteri</th><th>Yorum</th><th>Puan</th><th>Duygu</th><th>Tarih</th><th>İşlem</th></tr>
          </thead>
          <tbody id="reviews-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script>
requireAuth(); requireAdmin(); updateSidebar();

async function loadReviews() {
  const res = await apiFetch('/api/admin/reviews');
  if (!res || !res.ok) return;
  const reviews = await res.json();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('reviews-table').style.display = '';
  document.getElementById('reviews-body').innerHTML = reviews.map(r => `
    <tr>
      <td>${r.id}</td>
      <td class="small">${r.user ? r.user.ad_soyad : '-'}</td>
      <td>${r.musteri_adi || '<span class="text-muted">Anonim</span>'}</td>
      <td><span class="d-inline-block text-truncate" style="max-width:180px" title="${r.yorum_metni}">${r.yorum_metni}</span></td>
      <td>${starsHtml(r.puan)}</td>
      <td>${r.analiz ? duyguBadge(r.analiz.duygu) : '<span class="badge bg-secondary">-</span>'}</td>
      <td class="small">${formatDate(r.olusturma)}</td>
      <td>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteReview(${r.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

async function deleteReview(id) {
  if (!confirm('Bu yorumu silmek istediğinizden emin misiniz?')) return;
  const res = await apiFetch(`/api/admin/reviews/${id}`, { method: 'DELETE' });
  if (res && res.ok) { showAlert('Yorum silindi', 'success'); loadReviews(); }
  else showAlert('Silme başarısız');
}

loadReviews();
</script>
</body>
</html>
