<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yorumlarım - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
  <style>
    .review-card {
      border-left: 4px solid #6c757d;
      background:#fff; border-radius: 10px;
      padding:16px; margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(15,23,42,.05);
    }
    .review-card.olumlu  { border-left-color: #28a745; }
    .review-card.olumsuz { border-left-color: #dc3545; }
    .review-card.notr    { border-left-color: #ffc107; }
    footer.site-footer { margin-left: var(--sidebar-width); transition: margin-left .3s ease; }
    body.sidebar-collapsed footer.site-footer { margin-left: 78px; }
    @media (max-width: 768px) { footer.site-footer { margin-left: 0; } }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <div class="px-4 pb-2">
      <small class="text-white-50" style="font-size:.72rem;letter-spacing:.07em;text-transform:uppercase">Müşteri</small>
      <div class="text-white fw-semibold small mt-1" id="sidebar-user"></div>
    </div>
    <a href="/musteri/anasayfa.html" class="nav-link"><i class="bi bi-shop"></i> İşletmeler</a>
    <a href="/musteri/yorumlarim.html" class="nav-link active"><i class="bi bi-chat-heart"></i> Yorumlarım</a>
    <a href="/musteri/profil.html" class="nav-link"><i class="bi bi-person-circle"></i> Profil</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/gelistirici/" class="nav-link"><i class="bi bi-code-slash"></i> Geliştirici</a>
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <div class="mb-4">
    <h4 class="fw-bold mb-1">Yorumlarım</h4>
    <p class="text-muted small">İşletmelere bıraktığınız tüm yorumlar burada listelenir</p>
  </div>
  <div id="alert-container"></div>

  <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  <div id="liste"></div>
  <div id="empty" class="text-center py-5 text-muted" style="display:none">
    <i class="bi bi-chat-square-dots" style="font-size:3rem"></i>
    <p class="mt-2 mb-3">Henüz yorum bırakmadınız</p>
    <a href="/musteri/anasayfa.html" class="btn btn-primary">İşletmeleri Keşfet</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script src="/betikler/altbilgi.js" defer></script>
<script>
requireAuth();
const user = getUser();
if (user && user.rol !== 'musteri') window.location.href = rolHomePage(user.rol);
updateSidebar();

async function loadYorumlarim() {
  const res = await apiFetch('/api/musteri/yorumlarim');
  if (!res || !res.ok) {
    document.getElementById('loading').innerHTML = '<p class="text-danger">Yüklenemedi</p>';
    return;
  }
  const list = await res.json();
  document.getElementById('loading').style.display = 'none';
  if (!list.length) {
    document.getElementById('empty').style.display = '';
    return;
  }
  document.getElementById('liste').innerHTML = list.map(r => {
    const cls = r.analiz ? (r.analiz.duygu === 'nötr' ? 'notr' : r.analiz.duygu) : '';
    return `
      <div class="review-card ${cls}">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <a href="/musteri/isletme.html?id=${r.business ? r.business.id : ''}" class="fw-bold text-decoration-none">
              <i class="bi bi-shop"></i> ${r.business ? r.business.isletme_adi : '—'}
            </a>
            ${r.business && r.business.sehir ? `<small class="text-muted ms-2"><i class="bi bi-geo-alt"></i> ${r.business.sehir}</small>` : ''}
          </div>
          <small class="text-muted">${formatDate(r.olusturma)}</small>
        </div>
        <div class="mb-2">${starsHtml(r.puan)}</div>
        <p class="mb-2">${r.yorum_metni}</p>
        <div class="d-flex justify-content-between align-items-center">
          <div class="d-flex gap-2">
            ${r.analiz ? duyguBadge(r.analiz.duygu) : '<span class="badge bg-secondary">Analiz bekleniyor</span>'}
            ${r.analiz && r.analiz.konu_etiketi ? `<span class="badge bg-light text-dark border">${r.analiz.konu_etiketi}</span>` : ''}
          </div>
          <button class="btn btn-sm btn-outline-danger" onclick="deleteYorum(${r.id})">
            <i class="bi bi-trash"></i> Sil
          </button>
        </div>
      </div>
    `;
  }).join('');
}

async function deleteYorum(id) {
  if (!confirm('Yorumunuzu silmek istediğinizden emin misiniz?')) return;
  const res = await apiFetch('/api/musteri/yorum/' + id, { method: 'DELETE' });
  if (res && res.ok) {
    showAlert('Yorum silindi', 'success');
    loadYorumlarim();
  } else showAlert('Silme başarısız');
}

loadYorumlarim();
</script>
</body>
</html>
