<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İşletmeler - MüşteriYorum</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/stiller/stil.css" rel="stylesheet">
  <style>
    .business-card { transition: transform .15s; cursor:pointer; }
    .business-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.1)!important; }
    .business-thumb {
      height:120px; border-radius:8px 8px 0 0;
      background:linear-gradient(135deg, #007bff22, #28a74522);
      display:flex; align-items:center; justify-content:center;
      font-size:3rem; color:#007bff;
    }
    footer.site-footer { margin-left: var(--sidebar-width); transition: margin-left .3s ease; }
    body.sidebar-collapsed footer.site-footer { margin-left: 78px; }
    @media (max-width: 768px) { footer.site-footer { margin-left: 0; } }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand"><i class="bi bi-chat-square-text-fill text-primary"></i> MüşteriYorum</div>
  <nav class="mt-3">
    <div class="px-4 pb-2">
      <small class="text-white-50" style="font-size:.72rem;letter-spacing:.07em;text-transform:uppercase">Müşteri</small>
      <div class="text-white fw-semibold small mt-1" id="sidebar-user"></div>
    </div>
    <a href="/musteri/anasayfa.html" class="nav-link active"><i class="bi bi-shop"></i> İşletmeler</a>
    <a href="/musteri/yorumlarim.html" class="nav-link"><i class="bi bi-chat-heart"></i> Yorumlarım</a>
    <a href="/musteri/profil.html" class="nav-link"><i class="bi bi-person-circle"></i> Profil</a>
    <hr style="border-color:rgba(255,255,255,0.1)">
    <a href="/gelistirici/" class="nav-link"><i class="bi bi-code-slash"></i> Geliştirici</a>
    <a href="#" class="nav-link logout-btn"><i class="bi bi-box-arrow-right"></i> Çıkış</a>
  </nav>
</div>

<div class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="fw-bold mb-1">İşletmeleri Keşfet</h4>
      <p class="text-muted mb-0 small">Yorum bırakmak istediğiniz işletmeyi seçin</p>
    </div>
  </div>

  <!-- Filtre -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-2">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control" id="filter-arama" placeholder="İşletme adı ara...">
          </div>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="filter-sehir"><option value="">Tüm Şehirler</option></select>
        </div>
        <div class="col-md-3">
          <select class="form-select" id="filter-kategori"><option value="">Tüm Kategoriler</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- İşletme Listesi -->
  <div id="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  <div class="row g-4" id="businesses-grid" style="display:none"></div>
  <div id="empty" class="text-center py-5 text-muted" style="display:none">
    <i class="bi bi-shop-window" style="font-size:3rem"></i>
    <p class="mt-2">Aramanıza uygun işletme bulunamadı</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/betikler/ana.js"></script>
<script src="/betikler/altbilgi.js" defer></script>
<script>
requireAuth();
const user = getUser();
if (user && user.rol !== 'musteri') window.location.href = rolHomePage(user.rol);
updateSidebar();

let tumIsletmeler = [];

async function loadBusinesses() {
  const res = await fetch('/api/businesses');
  if (!res.ok) {
    document.getElementById('loading').innerHTML = '<p class="text-danger">Yüklenemedi</p>';
    return;
  }
  tumIsletmeler = await res.json();

  const sehirler = [...new Set(tumIsletmeler.map(b => b.sehir).filter(Boolean))].sort();
  const kategoriler = [...new Set(tumIsletmeler.map(b => b.kategori).filter(Boolean))].sort();
  document.getElementById('filter-sehir').innerHTML =
    '<option value="">Tüm Şehirler</option>' + sehirler.map(s => `<option>${s}</option>`).join('');
  document.getElementById('filter-kategori').innerHTML =
    '<option value="">Tüm Kategoriler</option>' + kategoriler.map(k => `<option>${k}</option>`).join('');

  render();
}

function render() {
  const arama = document.getElementById('filter-arama').value.toLowerCase();
  const sehir = document.getElementById('filter-sehir').value;
  const kategori = document.getElementById('filter-kategori').value;

  const list = tumIsletmeler.filter(b =>
    (!arama || b.isletme_adi.toLowerCase().includes(arama)) &&
    (!sehir || b.sehir === sehir) &&
    (!kategori || b.kategori === kategori)
  );

  document.getElementById('loading').style.display = 'none';
  const grid = document.getElementById('businesses-grid');
  const empty = document.getElementById('empty');

  if (!list.length) {
    grid.style.display = 'none';
    empty.style.display = '';
    return;
  }

  grid.style.display = '';
  empty.style.display = 'none';
  grid.innerHTML = list.map(b => `
    <div class="col-md-4 col-lg-3">
      <div class="card border-0 shadow-sm business-card" onclick="window.location='/musteri/isletme.html?id=${b.id}'">
        <div class="business-thumb">
          <i class="bi bi-building"></i>
        </div>
        <div class="card-body">
          <h6 class="fw-bold mb-1">${b.isletme_adi}</h6>
          <small class="text-muted">
            ${b.kategori ? `<span class="badge bg-light text-dark border me-1">${b.kategori}</span>` : ''}
            ${b.sehir ? `<i class="bi bi-geo-alt text-danger"></i> ${b.sehir}` : ''}
          </small>
          <p class="text-muted small mt-2 mb-0">${b.aciklama || 'Yorum bırakmak için tıklayın'}</p>
        </div>
      </div>
    </div>
  `).join('');
}

document.getElementById('filter-arama').addEventListener('input', render);
document.getElementById('filter-sehir').addEventListener('change', render);
document.getElementById('filter-kategori').addEventListener('change', render);

loadBusinesses();
</script>
</body>
</html>
